<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>M&P Workshop — Final Round 2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a12;
      --card: #14131e;
      --border: #2a2840;
      --gold: #d4a843;
      --text: #e0dde8;
      --muted: #8884a0;
      --green: #2ecc71;
      --red: #e74c3c;
      --blue: #3498db;
      --accent: #c44dff;
      --accent2: #ff6b9d;
      --accent3: #4dccff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
      padding-bottom: 100px;
    }

    h1 {
      color: var(--gold);
      font-size: 1.5rem;
      text-align: center;
      margin-bottom: 4px;
      font-weight: 800;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
      margin-bottom: 8px;
    }

    .progress {
      text-align: center;
      color: var(--muted);
      font-size: 0.78rem;
      margin-bottom: 14px;
    }

    .progress .count {
      color: var(--gold);
      font-weight: 700;
    }

    .context-box {
      background: #1a1930;
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent3);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 10px;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .context-box strong {
      color: var(--accent3);
    }

    .context-box .your-answer {
      color: var(--gold);
      font-weight: 600;
    }

    .section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 16px;
    }

    .section-title {
      color: var(--gold);
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .section-desc {
      color: var(--muted);
      font-size: 0.78rem;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .question {
      margin-bottom: 20px;
    }

    .question:last-child {
      margin-bottom: 0;
    }

    .q-label {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .q-label .q-num {
      color: var(--gold);
      font-weight: 700;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 8px;
    }

    .opt-btn {
      background: #1c1b2e;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.82rem;
      text-align: left;
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1.3;
    }

    .opt-btn:hover {
      border-color: var(--gold);
    }

    .opt-btn.selected {
      background: #1f1e35;
      border-color: var(--gold);
      box-shadow: 0 0 0 1px var(--gold);
    }

    .opt-btn .opt-label {
      font-weight: 600;
    }

    .opt-btn .opt-desc {
      color: var(--muted);
      font-size: 0.75rem;
      display: block;
      margin-top: 2px;
    }

    .text-input {
      width: 100%;
      background: #1c1b2e;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.82rem;
      resize: vertical;
      min-height: 50px;
      outline: none;
      margin-top: 6px;
    }

    .text-input:focus {
      border-color: var(--gold);
    }

    .text-input::placeholder {
      color: #555;
    }

    .text-label {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 6px;
      display: block;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0;
    }

    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--card);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      z-index: 100;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:active {
      opacity: 0.7;
    }

    .btn-send {
      background: var(--green);
      color: #fff;
    }

    .btn-save {
      background: var(--blue);
      color: #fff;
    }

    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--green);
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.85rem;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
    }

    .toast.error {
      background: var(--red);
    }

    .back-link {
      display: block;
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      text-decoration: none;
      margin-bottom: 12px;
    }

    .back-link:hover {
      color: var(--gold);
    }

    @media (max-width: 600px) {
      body {
        padding: 10px;
        padding-bottom: 90px;
      }

      .section {
        padding: 14px;
      }
    }
  </style>
</head>

<body>
  <a href="index.html" class="back-link">axogames.dev</a>
  <h1>Mortar & Pistol</h1>
  <p class="subtitle">Final Round 2 — Last 12 Questions</p>
  <p class="subtitle" style="font-size:0.7rem; margin-bottom:4px;">Nailing down the creative new directions from your
    last answers.</p>
  <div class="progress">Answered: <span class="count" id="progressCount">0</span> / <span id="totalCount">0</span></div>

  <div id="questionsContainer"></div>

  <div class="bottom-bar">
    <button class="btn btn-save" onclick="saveLocal()">Save Local</button>
    <button class="btn btn-send" onclick="sendToDiscord()">Send to Discord</button>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1485718166914207925/EN4xYAWpprqnR51SNyanYtWs4Jj3zbkLlY6Lj1zqySktm2UFSrVy8dIIAzMo-DFxzP8w";
    const SAVE_KEY = "mp_workshop_final2_answers";

    const SECTIONS = [
      {
        id: "S1", title: "Void — On-Death Implosion",
        desc: "You redesigned Void from 'gravity wells on hit' to 'on-death vortex grenades scaling with enemy max HP.' This is awesome — let's define it.",
        questions: [
          {
            id: "D1",
            context: "Your answer: <span class='your-answer'>\"On death enemies drop a vortex grenade style thing at their feet that pulls enemies in and does damage based on their max hp, smaller enemies do a small pull and like a tiny bit of damage, larger elites do a larger pull and significant damage.\"</span><br><br><strong>So the mechanic is:</strong> Kill an enemy with Void active → a vortex spawns at the corpse → it pulls nearby enemies inward and deals damage. The pull radius and damage scale with the dead enemy's max HP. Killing a Husk makes a small vortex. Killing an elite makes a big one. This creates chain-reaction potential: vortex pulls enemies into weapon range → more kills → more vortices.",
            text: "How long should the vortex last before it fades?",
            options: [
              { label: "Brief pulse (0.5s)", desc: "Quick implosion — snap pull and damage, then gone. Clean, no clutter. Fast chain reactions." },
              { label: "Short linger (1.5s)", desc: "Vortex persists briefly. Sustained pull + 2-3 damage ticks. Enemies get stuck in it." },
              { label: "Scales with enemy size", desc: "Husk vortex: 0.5s. Elite vortex: 2s. Boss minion: 1s. Bigger kill = bigger payoff." },
            ]
          },
          {
            id: "D2",
            context: "<strong>Damage scaling with enemy max HP:</strong> The vortex needs concrete numbers. If a Husk has 50 HP and drops a vortex that deals 'a tiny bit,' what's tiny? And if an elite has 250 HP, what's 'significant'?",
            text: "What percentage of the dead enemy's max HP should the vortex deal?",
            options: [
              { label: "5% max HP per tick", desc: "Husk (50 HP) vortex does ~2.5/tick. Elite (250 HP) does ~12.5/tick. Moderate, safe." },
              { label: "10% max HP as one burst", desc: "Single damage instance. Husk vortex: 5 dmg. Elite: 25 dmg. Bursty, simple." },
              { label: "15% max HP split over duration", desc: "Total damage = 15% of dead enemy's HP. Split across however many ticks the vortex lasts. Higher damage potential." },
            ]
          },
          {
            id: "D3",
            context: "<strong>Pull radius scaling:</strong> Small enemies make small vortices, big enemies make big ones. But what's the actual range?",
            text: "What pull radius for each enemy tier?",
            options: [
              { label: "Small: 40px / Elite: 90px / Boss-add: 60px", desc: "Tight vortices. Need enemy density for chain reactions. Precise." },
              { label: "Small: 60px / Elite: 120px / Boss-add: 80px", desc: "Medium range. Elite vortices cover a significant area. Good visual impact." },
              { label: "Small: 50px / Elite: 150px / Boss-add: 100px", desc: "Big gap between tiers. Elite kills feel dramatically different from regular kills." },
            ]
          },
        ]
      },
      {
        id: "S2", title: "Execution Proc — The Guillotine",
        desc: "You want execution as a chance-based proc (like RoR2 Guillotine), not a health threshold. Possibly a passive with Void-specific bonus.",
        questions: [
          {
            id: "D4",
            context: "Your answer: <span class='your-answer'>\"Should be a chance for it to proc, not a health threshold. Think the Guillotine item from Risk of Rain 2. Chance should be upgradable. Maybe this should just be a passive item that void gets a built-in buff for.\"</span><br><br><strong>In RoR2:</strong> Guillotine instantly kills elite enemies below 13% HP per stack (so 2 stacks = 26%). It only works on elites, not regular enemies.<br><br><strong>Proposed for M&P:</strong> An artifact called 'Executioner's Mark' — each hit on an enemy has X% chance to instantly kill it if it's below Y% HP. Void element doubles the proc chance or threshold.",
            text: "Should execution work on ALL enemies or only elites/specials?",
            options: [
              { label: "All enemies", desc: "Every enemy can be executed. Regular mobs die easily anyway, so it mostly matters for tanky ones." },
              { label: "Elites and above only", desc: "Like RoR2 Guillotine. Regular enemies don't need it. Makes you feel powerful against the hard targets." },
              { label: "HP threshold gate", desc: "Only procs on enemies above a certain max-HP threshold (e.g., 100+ HP). Functionally targets elites/lategame without a type check." },
            ]
          },
          {
            id: "D5",
            context: "The execution needs a base proc chance and a health threshold. These can both scale with the artifact level and Forge upgrades.",
            text: "What should the base execution stats be (before any upgrades)?",
            options: [
              { label: "5% chance below 15% HP", desc: "Low proc rate, reasonable threshold. Noticeable but not build-defining at Lv1." },
              { label: "8% chance below 10% HP", desc: "Higher proc rate but tighter HP window. Rewards getting enemies low first." },
              { label: "3% chance below 20% HP", desc: "Very low chance but wide threshold. Occasional lucky kills on anything damaged." },
            ]
          },
          {
            id: "D6",
            context: "You said Void should get a built-in buff for execution. How much stronger should Void's execution be compared to non-Void?",
            text: "How should Void boost execution?",
            options: [
              { label: "Double proc chance", desc: "Void: 10% chance instead of 5%. Simple, powerful, obvious synergy." },
              { label: "Double threshold", desc: "Void: execute below 30% HP instead of 15%. Wider kill window, same chance." },
              { label: "Both doubled", desc: "Void: 10% chance below 30%. Very strong — makes Void the 'execute' element. Might be OP." },
              { label: "Void adds guaranteed execute on vortex pull", desc: "Enemies pulled into a Void vortex and below the HP threshold are auto-executed. No chance roll needed." },
            ]
          },
        ]
      },
      {
        id: "S3", title: "Traits + Artifacts System",
        desc: "You chose Traits (unlimited minor buffs) + Artifacts (6 slots, tied to pool weapon evolutions). Let's define both tiers.",
        questions: [
          {
            id: "D7",
            context: "Your answer: <span class='your-answer'>\"Traits should have no limits, artifacts are limited to 6 per run and are what tie in with the evo of pool weapons. I'd like to explore option B (weapon-aware) as well.\"</span><br><br><strong>Proposed system:</strong><br>• <strong>Traits</strong>: Small stat bumps that appear in the level-up pool. No slot limit — you can stack as many as you want. Think: '+5% damage', '+3% crit chance', '+10 max HP'. They're the numerical upgrades.<br>• <strong>Artifacts</strong>: Major items with 6 slots. Found from bosses, milestone chests, or rare level-up options. Each artifact has a unique named effect. Pool weapon transmutations require a specific artifact (replaces the old passive-pairing system).<br>• <strong>Weapon-aware traits (Option B blend)</strong>: Some traits could adapt their effect based on your weapons. E.g., 'Focused Energy: +10% damage for beam/chain weapons, +8% area for AoE weapons.'",
            text: "How should traits appear in the level-up pool?",
            options: [
              { label: "Always 1 trait option per level-up", desc: "Every level-up has at least 1 trait among the 3 choices. Consistent progression." },
              { label: "Traits fill remaining slots", desc: "Weapons and artifacts get priority. Traits fill the gaps. More traits when you're full on weapons." },
              { label: "Traits are the default, weapons are rare", desc: "Most level-ups are 2 traits + 1 weapon/artifact. Weapons feel special when they appear." },
            ]
          },
          {
            id: "D8",
            context: "Artifacts replace the old passive system for transmutations. Instead of 'Bayonet Rush Lv5 + Gunpowder passive = Reaper's Bayonet,' it would be 'Bayonet Rush Lv5 + [specific artifact] = Reaper's Bayonet.'<br><br>This means artifacts need to be designed as interesting items in their own right AND serve as transmutation keys.",
            text: "Should artifacts be findable in the level-up pool or only from special sources?",
            options: [
              { label: "Bosses and milestone chests only", desc: "Artifacts are special drops. Never in level-up pool. Feels rare and exciting." },
              { label: "Rare level-up option + bosses", desc: "Can appear in level-up pool (low weight) AND drop from bosses. Multiple sources." },
              { label: "Forge unlocks + boss drops", desc: "Must unlock artifact availability in The Forge first, then they drop from bosses. Double gate." },
            ]
          },
          {
            id: "D9",
            context: "You want to explore weapon-aware passives (Option B) blended into the trait system. This means some traits would change their effect based on what weapons you have.",
            text: "How many traits should be weapon-aware vs simple stat boosts?",
            options: [
              { label: "Most are simple, a few weapon-aware", desc: "~80% simple stats (+damage, +speed). ~20% weapon-aware ('Focused Energy' adapts to weapon type). Easy to implement." },
              { label: "50/50 split", desc: "Half simple, half weapon-aware. Every couple level-ups has an interesting adaptive choice." },
              { label: "All weapon-aware", desc: "Every trait adapts to your loadout. Maximum build identity. Very complex to design." },
            ]
          },
        ]
      },
      {
        id: "S4", title: "Pool Weapon Redesign",
        desc: "You want to keep Arc Discharge and Seeker Rounds but redesign the other 4. Let's figure out what replaces them.",
        questions: [
          {
            id: "D10",
            context: "Your answer: <span class='your-answer'>\"I'm not a fan of the currently archived weapons aside from the lightning one and seeker rounds. We need to remake the weapons to bring them more in-line with the current ethos of weapons being flashy and unique.\"</span><br><br><strong>Keeping:</strong> Arc Discharge (CHAIN) and Seeker Rounds (BARRAGE).<br><strong>Cutting:</strong> Bayonet Rush (MELEE), Mortar Burst (AOE), Ember Shells (ORBIT), Blight Flask (DOT).<br><br>The cut weapons are all functional, but you're right that they feel generic compared to the character weapons (beam, lobbed flask, thrown keg, burst-fire). The replacements should be equally flashy.<br><br><strong>Replacement candidates (brainstorm):</strong><br>• <strong>Ricochet Shot</strong> (BOUNCE): Bullet bounces off enemies, gaining speed + damage each bounce. 3-6 bounces. Visual: zigzag trail between targets.<br>• <strong>Tether Mine</strong> (LINK): Drops a node. Two nodes near each other create a damage beam between them. Enemies walk through the beam = damage. Place tactically.<br>• <strong>Magma Geyser</strong> (ERUPTION): Delayed AoE — marks a spot, 1s later a pillar of fire erupts from below. Replaces generic mortar with something dramatic.<br>• <strong>Sawblade Launcher</strong> (ROLLING): Fires a sawblade along the ground. It rolls in a straight line, piercing all enemies, bouncing off the arena walls (if walls exist) or curving back. Visual: spinning blade with sparks.<br>• <strong>Phantom Sentry</strong> (TURRET): Places a stationary gun that auto-fires at nearby enemies for 8s. Like a temporary AI companion. Scales with your stats.<br>• <strong>Gravity Lash</strong> (WHIP): Cracks a void-energy whip in a wide arc. Pulls hit enemies toward you. Close-range CC + damage.",
            text: "Pick 4 replacements for the cut weapons (or describe your own in notes).",
            options: [
              { label: "Ricochet + Tether + Geyser + Sawblade", desc: "Bouncing, linking, erupting, rolling. All visually distinct, no overlap with existing weapons." },
              { label: "Ricochet + Sentry + Geyser + Gravity Lash", desc: "Bouncing, turret, erupting, whip. Adds a companion/turret type and melee replacement." },
              { label: "Sawblade + Sentry + Tether + Gravity Lash", desc: "Rolling, turret, linking, whip. All placement/zone-control focused. Strategic feel." },
            ]
          },
          {
            id: "D11",
            context: "The old transmutation system paired each pool weapon with a specific passive. With the new Traits + Artifacts system, transmutations pair with an artifact instead. But if we're redesigning 4 of 6 pool weapons, we also need new transmutations for them.<br><br>We can design these later — but one thing to decide now:",
            text: "Should transmutations be designed alongside the new weapons, or later as a separate phase?",
            options: [
              { label: "Design together", desc: "Each new weapon is designed WITH its transmutation in mind. Ensures the evolution feels like a natural upgrade." },
              { label: "Weapons first, transmutations later", desc: "Get the base 4 weapons feeling good. Transmutations are a follow-up pass. Less design work per phase." },
            ]
          },
          {
            id: "D12",
            context: "You originally said pool weapons should be unlocked gradually, not all at once. With 2 kept + 4 redesigned = 6 total pool weapons, plus future achievement weapons (hero variants, hybrids, boss weapons):",
            text: "How should the 6 base pool weapons become available?",
            options: [
              { label: "2 free, 4 unlock progressively", desc: "Arc Discharge + Seeker Rounds free from run 1. Other 4 unlock through various achievements." },
              { label: "All 6 free from start", desc: "Pool weapons are the baseline. Achievement weapons (hero variants, boss drops) are the unlock content." },
              { label: "Forge purchases", desc: "Buy each pool weapon (50-100 dust). Player picks unlock order. All available early without much grind." },
            ]
          },
        ]
      },
    ];

    let answers = {};
    let totalQuestions = 0;

    function init() {
      SECTIONS.forEach(s => { totalQuestions += s.questions.length; });
      document.getElementById('totalCount').textContent = totalQuestions;
      const saved = localStorage.getItem(SAVE_KEY);
      if (saved) { try { answers = JSON.parse(saved); } catch (e) { } }
      render(); updateProgress();
    }

    function render() {
      const container = document.getElementById('questionsContainer');
      container.innerHTML = '';
      SECTIONS.forEach(section => {
        const div = document.createElement('div');
        div.className = 'section';
        let html = `<div class="section-title">${section.title}</div>`;
        html += `<div class="section-desc">${section.desc}</div>`;
        section.questions.forEach((q, qi) => {
          html += `<div class="question">`;
          if (q.context) html += `<div class="context-box">${q.context}</div>`;
          html += `<div class="q-label"><span class="q-num">${q.id}</span>: ${q.text}</div>`;
          if (q.options) {
            html += `<div class="options">`;
            q.options.forEach(opt => {
              const sel = answers[q.id] === opt.label ? 'selected' : '';
              const safeLabel = opt.label.replace(/'/g, "\\'");
              html += `<button class="opt-btn ${sel}" onclick="onSelect('${q.id}', '${safeLabel}', this)">`;
              html += `<span class="opt-label">${opt.label}</span>`;
              if (opt.desc) html += `<span class="opt-desc">${opt.desc}</span>`;
              html += `</button>`;
            });
            html += `</div>`;
          }
          const textKey = q.id + '_text';
          const textVal = answers[textKey] || '';
          html += `<span class="text-label">Notes / alternative ideas:</span>`;
          html += `<textarea class="text-input" id="ta_${q.id}" placeholder="Type your thoughts here..." oninput="onText('${q.id}_text', this.value)">${textVal}</textarea>`;
          html += `</div>`;
          if (qi < section.questions.length - 1) html += `<div class="divider"></div>`;
        });
        div.innerHTML = html;
        container.appendChild(div);
      });
    }

    function onSelect(qid, value, btn) {
      answers[qid] = value;
      btn.parentElement.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      autoSave(); updateProgress();
    }

    function onText(key, value) { answers[key] = value; autoSave(); updateProgress(); }

    function updateProgress() {
      let count = 0;
      SECTIONS.forEach(s => {
        s.questions.forEach(q => {
          if ((answers[q.id] && answers[q.id].trim()) || (answers[q.id + '_text'] && answers[q.id + '_text'].trim())) count++;
        });
      });
      document.getElementById('progressCount').textContent = count;
    }

    function autoSave() { localStorage.setItem(SAVE_KEY, JSON.stringify(answers)); }

    function showToast(msg, isError) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (isError ? ' error' : '');
      setTimeout(() => t.className = 'toast', 2500);
    }

    function buildMarkdown() {
      let md = "# Final Round 2 Answers\n\n";
      SECTIONS.forEach(section => {
        md += `## ${section.title}\n\n`;
        section.questions.forEach(q => {
          const choice = answers[q.id] || "(no selection)";
          const notes = answers[q.id + '_text'] || "";
          md += `**${q.id}**: ${q.text}\n`;
          md += `> **${choice}**\n`;
          if (notes.trim()) md += `> Notes: ${notes}\n`;
          md += `\n`;
        });
      });
      return md;
    }

    function saveLocal() {
      autoSave();
      const md = buildMarkdown();
      const blob = new Blob([md], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'WORKSHOP_FINAL2_ANSWERS.md'; a.click();
      URL.revokeObjectURL(url);
      showToast('Downloaded WORKSHOP_FINAL2_ANSWERS.md');
    }

    async function sendToDiscord() {
      const answered = [];
      SECTIONS.forEach(s => {
        s.questions.forEach(q => {
          if ((answers[q.id] && answers[q.id].trim()) || (answers[q.id + '_text'] && answers[q.id + '_text'].trim())) answered.push(q);
        });
      });
      if (answered.length === 0) { showToast('Answer at least one question first', true); return; }

      const embeds = [];
      let cur = { title: "Final Round 2 Answers", color: 16750848, fields: [], footer: { text: `${answered.length}/${totalQuestions} answered` }, timestamp: new Date().toISOString() };
      SECTIONS.forEach(section => {
        section.questions.forEach(q => {
          const choice = answers[q.id]; const notes = answers[q.id + '_text'];
          if ((!choice || !choice.trim()) && (!notes || !notes.trim())) return;
          if (cur.fields.length >= 25) { embeds.push(cur); cur = { title: "Final R2 (cont.)", color: 16750848, fields: [] }; }
          let val = choice ? `**${choice}**` : "(no selection)";
          if (notes && notes.trim()) val += `\n> ${notes.substring(0, 900)}`;
          if (val.length > 1024) val = val.substring(0, 1021) + '...';
          cur.fields.push({ name: `${q.id}: ${q.text.substring(0, 200)}`, value: val, inline: false });
        });
      });
      embeds.push(cur);

      try {
        const res = await fetch(WEBHOOK_URL, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: "**Final Round 2 Responses**", embeds: embeds.slice(0, 10) })
        });
        if (res.ok || res.status === 204) showToast('Sent to Discord!');
        else showToast('Discord error: ' + res.status, true);
      } catch (e) { showToast('Network error', true); }
    }

    init();
  </script>
</body>

</html>
