<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axo Games</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0b0e17;--surface:#141825;--border:#1e2436;
    --text:#e2e8f0;--muted:#7c8bb4;--accent:#7c6aef;--accent-glow:#7c6aef55;
  }
  body{
    font-family:'Segoe UI',system-ui,sans-serif;
    background:var(--bg);color:var(--text);
    min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
    padding:2rem;
  }
  .logo{font-size:3rem;font-weight:800;letter-spacing:-.02em;margin-bottom:.25rem}
  .logo span{color:var(--accent)}
  .tagline{color:var(--muted);font-size:1.1rem;margin-bottom:2.5rem}
  .card{
    background:var(--surface);border:1px solid var(--border);border-radius:12px;
    padding:2rem 2.5rem;max-width:420px;width:100%;
    box-shadow:0 0 40px var(--accent-glow);
  }
  .card h2{font-size:1.3rem;margin-bottom:.5rem}
  .card p{color:var(--muted);font-size:.95rem;line-height:1.5}
  .badge{
    display:inline-block;margin-top:1.5rem;
    padding:.35rem .9rem;border-radius:20px;font-size:.8rem;font-weight:600;
    background:var(--accent);color:#fff;letter-spacing:.03em;
  }
  footer{margin-top:3rem;color:var(--muted);font-size:.8rem}
</style>
</head>
<body>
  <div class="logo"><span>axo</span>games</div>
  <p class="tagline">indie games &amp; experiments</p>
  <div class="card">
    <h2>Coming Soon</h2>
    <p>Something is brewing. Stay tuned for updates on our first release.</p>
    <span class="badge">In Development</span>
  </div>
  <footer>&copy; 2026 axogames.dev</footer>
</body>
</html>
